{{define "flash"}}
{{range .Flashes}}
<div class="mb-4 p-4 rounded">
    {{if eq .Type "success"}}
    <p class="m-0 text-green-700 bg-green-100">✅ {{.Message}}</p>
    {{else if eq .Type "error"}}
    <p class="m-0 text-red-700 bg-red-100">❌ {{.Message}}</p>
    {{else}}
    <p class="m-0 text-blue-700 bg-blue-100">{{.Message}}</p>
    {{end}}
</div>
{{end}}
{{end}}
