services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: svensktvin
      POSTGRES_USER: sv_app
      POSTGRES_PASSWORD: ${PG_PASSWORD:-sv_dev_pass}
    ports:
      - "5434:5432"
    volumes:
      - sv_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sv_app -d svensktvin"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sv_internal

  api:
    build:
      context: ./core-api
      dockerfile: Dockerfile
    ports:
      - "9091:9091"
    environment:
      DATABASE_URL: postgres://sv_app:${PG_PASSWORD:-sv_dev_pass}@db:5432/svensktvin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sv_internal
    restart: unless-stopped

volumes:
  sv_db_data:

networks:
  sv_internal:
    driver: bridge
